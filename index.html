    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDAcKcg3alPOTH3FFGelYmsW7jcMMe2PLI",
            authDomain: "upnvjdatsystem.firebaseapp.com",
            databaseURL: "https://upnvjdatsystem-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "upnvjdatsystem",
            storageBucket: "upnvjdatsystem.firebasestorage.app",
            messagingSenderId: "57095309946",
            appId: "1:57095309946:web:b0e9f3f86380d549ffc9c3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Global variables
        let isMaintenance = false;
        let maintenanceData = null;
        let countdownValue = 5;
        let countdownInterval = null;
        let redirectTimeout = null;

        // Create particles
        function createParticles() {
            const container = document.getElementById('particles');
            const colors = [
                'rgba(255,255,255,0.1)', 
                'rgba(0,136,204,0.1)', 
                'rgba(0,102,51,0.1)',
                'rgba(245,158,11,0.08)'
            ];
            
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 10 + 5;
                const posX = Math.random() * 100;
                const posY = Math.random() * 100;
                const delay = Math.random() * 6;
                const duration = Math.random() * 6 + 4;
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                particle.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    left: ${posX}%;
                    top: ${posY}%;
                    background: ${color};
                    animation-delay: ${delay}s;
                    animation-duration: ${duration}s;
                `;
                
                container.appendChild(particle);
            }
        }

        // Check Maintenance Status
        async function checkMaintenanceStatus() {
            const checkingOverlay = document.getElementById('checkingOverlay');
            if (checkingOverlay) checkingOverlay.style.display = 'flex';
            
            try {
                const doc = await db.collection('settings').doc('maintenance').get();
                
                if (doc.exists) {
                    maintenanceData = doc.data();
                    
                    if (maintenanceData.active === true) {
                        if (maintenanceData.endTime) {
                            const endTime = maintenanceData.endTime.toDate();
                            const now = new Date();
                            
                            if (now > endTime) {
                                await db.collection('settings').doc('maintenance').update({
                                    active: false,
                                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                                });
                                showNormalMode();
                            } else {
                                showMaintenanceMode(maintenanceData);
                            }
                        } else {
                            showMaintenanceMode(maintenanceData);
                        }
                    } else {
                        showNormalMode();
                    }
                } else {
                    showNormalMode();
                }
            } catch (error) {
                console.error('Error checking maintenance status:', error);
                showNormalMode();
            } finally {
                if (checkingOverlay) checkingOverlay.style.display = 'none';
            }
        }

        // Show Normal Mode
        function showNormalMode() {
            isMaintenance = false;
            document.getElementById('bodyElement').className = 'normal-mode';
            document.getElementById('normalSplash').style.display = 'block';
            document.getElementById('maintenanceScreen').style.display = 'none';
            startCountdown();
        }

        // Show Maintenance Mode
        function showMaintenanceMode(data) {
            isMaintenance = true;
            document.getElementById('bodyElement').className = 'maintenance-mode';
            document.getElementById('normalSplash').style.display = 'none';
            document.getElementById('maintenanceScreen').style.display = 'block';
            
            const title = data.title || 'Website Sedang Dalam Pemeliharaan';
            const message = data.message || 'Mohon maaf, website sedang dalam pemeliharaan. Silakan kunjungi kembali nanti.';
            
            document.getElementById('maintenanceTitleDisplay').textContent = title;
            document.getElementById('maintenanceMessageDisplay').textContent = message;
            
            if (data.endTime) {
                const endTime = data.endTime.toDate();
                const formattedTime = endTime.toLocaleString('id-ID', {
                    weekday: 'long',
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                document.getElementById('maintenanceEndTimeText').textContent = 
                    `Estimasi selesai: ${formattedTime} WIB`;
                
                const now = new Date();
                const delay = endTime.getTime() - now.getTime();
                
                if (delay > 0) {
                    setTimeout(async () => {
                        console.log('✅ Maintenance time ended, auto-checking...');
                        await checkMaintenanceStatus();
                    }, delay + 1000);
                }
            } else {
                document.getElementById('maintenanceEndTimeText').textContent = 
                    'Estimasi selesai: Segera';
            }
            
            if (countdownInterval) clearInterval(countdownInterval);
            if (redirectTimeout) clearTimeout(redirectTimeout);
        }

        // Start Countdown
        function startCountdown() {
            countdownValue = 5;
            const countdownEl = document.getElementById('countdownNumber');
            const loadingBar = document.getElementById('loadingBar');
            const loadingStatus = document.getElementById('loadingStatus');
            
            if (countdownEl) countdownEl.textContent = countdownValue;
            if (loadingBar) loadingBar.style.animation = 'none';
            
            if (loadingBar) {
                loadingBar.offsetHeight;
                loadingBar.style.animation = 'loadingFill 5s linear forwards';
            }
            
            if (loadingStatus) loadingStatus.textContent = 'Mengalihkan ke halaman utama';
            
            countdownInterval = setInterval(() => {
                countdownValue--;
                if (countdownEl) countdownEl.textContent = countdownValue;
                
                if (countdownValue <= 0) {
                    clearInterval(countdownInterval);
                    redirectToMain();
                }
            }, 1000);
            
            redirectTimeout = setTimeout(() => {
                redirectToMain();
            }, 5000);
        }

        // Redirect to main website
        function redirectToMain() {
            if (!isMaintenance) {
                window.location.href = './sman68.html';
            }
        }

        // Skip button
        document.getElementById('skipBtn').addEventListener('click', function(e) {
            e.preventDefault();
            if (!isMaintenance) {
                if (countdownInterval) clearInterval(countdownInterval);
                if (redirectTimeout) clearTimeout(redirectTimeout);
                window.location.href = './sman68.html';
            }
        });

        // Auto-refresh maintenance status setiap 30 detik
        function setupAutoRefresh() {
            setInterval(async () => {
                if (isMaintenance) {
                    try {
                        const doc = await db.collection('settings').doc('maintenance').get();
                        if (doc.exists) {
                            const data = doc.data();
                            if (!data.active) {
                                showNormalMode();
                            } else if (data.endTime) {
                                const endTime = data.endTime.toDate();
                                const now = new Date();
                                if (now > endTime) {
                                    await db.collection('settings').doc('maintenance').update({
                                        active: false,
                                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                                    });
                                    showNormalMode();
                                } else {
                                    document.getElementById('maintenanceEndTimeText').textContent = 
                                        `Estimasi selesai: ${endTime.toLocaleString('id-ID', {
                                            weekday: 'long',
                                            day: 'numeric',
                                            month: 'long',
                                            year: 'numeric',
                                            hour: '2-digit',
                                            minute: '2-digit'
                                        })} WIB`;
                                }
                            }
                        }
                    } catch (error) {
                        console.log('Auto-refresh check failed');
                    }
                }
            }, 30000);
        }

        // Listen for realtime changes in maintenance settings
        function setupMaintenanceListener() {
            db.collection('settings').doc('maintenance')
                .onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        
                        if (data.active === true) {
                            if (!isMaintenance) {
                                showMaintenanceMode(data);
                            } else {
                                maintenanceData = data;
                                document.getElementById('maintenanceTitleDisplay').textContent = 
                                    data.title || 'Website Sedang Dalam Pemeliharaan';
                                document.getElementById('maintenanceMessageDisplay').textContent = 
                                    data.message || 'Mohon maaf, website sedang dalam pemeliharaan.';
                            }
                        } else {
                            if (isMaintenance) {
                                showNormalMode();
                            }
                        }
                    }
                }, (error) => {
                    console.log('Maintenance listener error:', error);
                });
        }

        // 🔔 Popup Notifikasi
        function showNotificationPopup() {
            if (!('Notification' in window)) return;
            const hasAsked = localStorage.getItem('notificationAsked');
            if (hasAsked || Notification.permission === 'granted' || Notification.permission === 'denied') return;
            
            const popup = document.createElement('div');
            popup.id = 'notifPopup';
            popup.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:white;padding:20px 25px;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.3);z-index:99999;display:flex;align-items:center;gap:15px;max-width:450px;width:90%;';
            popup.innerHTML = '<i class="fas fa-bell" style="font-size:2rem;color:#006633;"></i><div style="flex:1;"><p style="font-weight:700;color:#1e293b;margin-bottom:3px;">Aktifkan Notifikasi</p><p style="font-size:0.85rem;color:#64748b;">Dapatkan info terbaru berita, agenda, dan pengumuman penting.</p></div><button id="allowNotif" style="padding:10px 20px;background:#006633;color:white;border:none;border-radius:50px;font-weight:600;cursor:pointer;white-space:nowrap;">Izinkan</button><button id="denyNotif" style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:1.2rem;">&times;</button>';
            
            document.body.appendChild(popup);
            
            document.getElementById('allowNotif').addEventListener('click', () => {
                popup.remove();
                localStorage.setItem('notificationAsked', 'true');
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        new Notification('✅ Notifikasi Diaktifkan!', {
                            body: 'Anda akan menerima notifikasi dari SMAN 68 Jakarta.',
                            icon: 'https://upload.wikimedia.org/wikipedia/id/1/19/Logo_SMAN_68_Jakarta.png'
                        });
                    }
                });
            });
            
            document.getElementById('denyNotif').addEventListener('click', () => {
                popup.remove();
                localStorage.setItem('notificationAsked', 'true');
            });
        }

        function initialize() {
            createParticles();
            checkMaintenanceStatus();
            setupAutoRefresh();
            setupMaintenanceListener();
            
            // 🔔 Tampilkan popup notifikasi setelah 5 detik
            setTimeout(() => {
                showNotificationPopup();
            }, 5000);
        }

        window.checkMaintenanceStatus = checkMaintenanceStatus;
        initialize();
    </script>
